name: Cleanup Old Releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: contains(github.event.head_commit.message, '[cleanup-old-releases]')
    runs-on: ubuntu-latest
    steps:
      - name: Keep only latest release and tag
        uses: actions/github-script@v7
        with:
          script: |
            const keepTag = 'v1.0.7';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (release.tag_name === keepTag) {
                core.info(`Keeping release ${release.tag_name}`);
                continue;
              }

              core.info(`Deleting release ${release.tag_name} (${release.id})`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            }

            const refs = await github.paginate(github.rest.git.listMatchingRefs, {
              owner,
              repo,
              ref: 'tags/v',
              per_page: 100,
            });

            for (const ref of refs) {
              const tagName = ref.ref.replace('refs/tags/', '');
              if (tagName === keepTag) {
                core.info(`Keeping tag ${tagName}`);
                continue;
              }

              core.info(`Deleting tag ${tagName}`);
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tagName}`,
              });
            }
